<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>Mininet意图驱动网络仿真</title>
  <script src="https://unpkg.com/cytoscape@3.23.0/dist/cytoscape.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 10px; }
    #topology { width: 100%; height: 400px; border: 1px solid #aaa; }
    #input-area { margin-top: 10px; }
    button { padding: 8px 16px; margin-top: 5px; }
    textarea { font-family: monospace; }
  </style>
</head>
<body>

<h2>网络拓扑可视化与意图输入</h2>

<!-- 拓扑展示区 -->
<div id="topology"></div>

<!-- 意图输入区 -->
<div id="input-area">
  <textarea id="intent-input" rows="3" style="width: 100%;" placeholder="请输入网络意图，例如：创建一个包含 s1, h1, h2 的拓扑"></textarea><br />
  <button onclick="sendIntent()">发送意图</button>
  <pre id="response" style="background:#eee; padding:10px; white-space: pre-wrap;"></pre>
</div>

<script>
const serverUrl = "http://10.20.33.108:5000";  // ← 修改为你的后端 IP

// 初始化 Cytoscape 画布
let cy = cytoscape({
  container: document.getElementById("topology"),
  elements: [],
  style: [
    {
      selector: "node",
      style: {
        "background-color": ele => ele.data("type") === "switch" ? "#FF851B" : "#0074D9",
        label: "data(id)",
        color: "#fff",
        "text-valign": "center",
        "text-halign": "center",
        "font-size": 14
      }
    },
    {
      selector: "edge",
      style: {
        width: 2,
        "line-color": "#aaa",
        "target-arrow-color": "#aaa",
        "target-arrow-shape": "triangle"
      }
    }
  ],
  layout: { name: "circle" }
});

// 加载后端的拓扑图数据
function loadTopology() {
  fetch(serverUrl + "/topology")
    .then(res => res.json())
    .then(data => {
      cy.elements().remove();
      cy.add(data.nodes);
      cy.add(data.edges);
      cy.layout({ name: "circle" }).run();
    })
    .catch(err => {
      console.error("拓扑加载失败:", err);
      alert("无法加载拓扑图，请检查服务器！");
    });
}

// 发送用户意图
function sendIntent() {
  const intent = document.getElementById("intent-input").value.trim();
  if (!intent) {
    alert("请输入意图！");
    return;
  }

  fetch(serverUrl + "/intent", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ intent })
  })
    .then(res => res.json())
    .then(data => {
      if (data.error) {
        document.getElementById("response").textContent = "❌ 错误：" + data.error;
      } else {
        document.getElementById("response").textContent =
          "✅ 生成代码:\n" + data.code + "\n\n🖥️ 运行输出:\n" + data.output;

        // 重新加载拓扑图
        loadTopology();
      }
    })
    .catch(err => {
      document.getElementById("response").textContent = "❌ 请求失败：" + err;
    });
}

// 页面加载时自动加载当前拓扑图
window.onload = loadTopology;
</script>

</body>
</html>
