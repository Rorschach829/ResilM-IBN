<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>意图驱动网络配置系统</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    #main-layout {
      display: flex;
      gap: 30px;
      align-items: flex-start;
    }

    #left-panel {
      flex: 1;
      min-width: 600px;
    }

    #right-panel {
      flex: 1;
      max-width: 600px;
    }

    textarea {
      width: 100%;
      margin-bottom: 10px;
    }

    button {
      margin-right: 10px;
      margin-top: 5px;
    }

    pre {
      background: #f4f4f4;
      padding: 10px;
      white-space: pre-wrap;
      border: 1px solid #ddd;
      max-height: 500px;
      overflow-y: auto;
    }

    svg {
      border: 1px solid #ccc;
      width: 100%;
      height: 500px;
      display: block;
    }
  </style>
</head>
<body>
  <h1>意图驱动网络配置系统</h1>

  <div id="main-layout">
    <div id="left-panel">
      <h3>网络拓扑图</h3>
      <svg id="network"></svg>
      <button onclick="loadTopology()">🔄 刷新拓扑</button>
      <button onclick="stopTopology()">🛑 退出当前拓扑</button>
    </div>

    <div id="right-panel">
      <h3>批量自定义意图测试</h3>
      <div id="custom-intent-list">
        <textarea rows="2" placeholder="在此输入一条意图，例如：创建包含 s1、h1、h2 的拓扑"></textarea>
      </div>
      <button onclick="addCustomIntent()">➕ 添加一条意图</button>
      <button onclick="sendAllIntents()">🚀 发送所有意图</button>
      <pre id="batch-response"></pre>
    </div>

    <div id="tokenDisplay" style="position: fixed; bottom: 10px; right: 20px; background-color: #f0f0f0; padding: 8px; border-radius: 5px; font-size: 14px;">
      Tokens Used: <span id="tokenCount">0</span>
    </div>
  </div>

  <script>
    const serverUrl = "http://localhost:5000";

    function addCustomIntent() {
      const container = document.getElementById("custom-intent-list");
      const textarea = document.createElement("textarea");
      textarea.rows = 2;
      textarea.placeholder = "新的意图...";
      container.appendChild(textarea);
    }

    async function sendAllIntents() {
      const results = [];
      const inputs = document.querySelectorAll("#custom-intent-list textarea");

      for (let i = 0; i < inputs.length; i++) {
        const intent = inputs[i].value.trim();
        if (!intent) continue;

        inputs[i].style.backgroundColor = "#ffffcc";

        try {
          const res = await fetch(serverUrl + "/intent", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ intent })
          });

          const data = await res.json();
          const now = new Date().toLocaleString('zh-CN', { hour12: false });

          let text = `✅ 第 ${i + 1} 条意图：${intent}\n`;

          if (data.error) {
            text += `❌ 错误: ${data.error}\n时间: ${now}\n\n`;
            inputs[i].style.backgroundColor = "#fdd";
          } else {
            let resultText = "";

            if (Array.isArray(data.output)) {
              resultText = data.output.map((item, idx) => {
                return `🔹 [第 ${idx + 1} 条指令]\n类型: ${item.action}\n结果:\n${item.result}`;
              }).join("\n\n");
            } else {
              // fallback，兼容旧结构
              resultText = typeof data.output === 'object' && data.output?.interpretation
                ? data.output.interpretation
                : data.output;
            }

text += `${resultText}\n🕒 时间: ${now}\n\n`;

            inputs[i].style.backgroundColor = "#d2f8d2";

            if (["create_topology", "install_flowtable"].includes(data.instruction.action)) {
              loadTopology();
            }
          }

          results.push(text);
        } catch (err) {
          results.push(`❌ 第 ${i + 1} 条意图请求失败：${err}\n\n`);
          inputs[i].style.backgroundColor = "#fdd";
        }
      }

      document.getElementById("batch-response").textContent = results.join("\n");
    }

    async function stopTopology() {
      const confirmed = confirm("你确定要退出并删除当前拓扑吗？");
      if (!confirmed) return;

      try {
        const res = await fetch(serverUrl + "/stop", {
          method: "POST"
        });

        const data = await res.json();
        alert("✅ 拓扑删除结果: " + data.message);

        loadTopology();
      } catch (err) {
        alert("❌ 删除失败：" + err);
      }
    }

    function drag(simulation) {
      function dragstarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
      }

      function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
      }

      function dragended(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
      }

      return d3.drag()
        .on("start", dragstarted)
        .on("drag", dragged)
        .on("end", dragended);
    }

    async function loadTopology() {
      const res = await fetch(serverUrl + "/topology");
      const data = await res.json();
      const nodes = data.nodes || [];
      const links = data.links || [];

      const svg = d3.select("#network");
      svg.selectAll("*").remove();

      const width = svg.node().clientWidth;
      const height = svg.node().clientHeight;

      const g = svg.append("g");

      svg.call(
        d3.zoom()
          .scaleExtent([0.5, 2])
          .on("zoom", (event) => {
            g.attr("transform", event.transform);
          })
      );

      const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(100))
        .force("charge", d3.forceManyBody().strength(-300))
        .force("center", d3.forceCenter(width / 2, height / 2));

      const link = g.append("g")
        .attr("stroke", "#999")
        .attr("stroke-opacity", 0.6)
        .selectAll("line")
        .data(links)
        .join("line")
        .attr("stroke-width", 2);

      const nodeGroup = g.append("g")
        .selectAll("g")
        .data(nodes)
        .join("g")
        .call(drag(simulation));

      nodeGroup.append("image")
        .attr("xlink:href", d => d.type === "switch" ? "/static/img/switch.png" : "/static/img/host.png")
        .attr("width", 40)
        .attr("height", 40)
        .attr("x", -20)
        .attr("y", -20);

      nodeGroup.append("text")
        .text(d => d.id)
        .attr("y", 30)
        .attr("text-anchor", "middle")
        .attr("font-size", 13)
        .attr("fill", "#000");

      simulation.on("tick", () => {
        link
          .attr("x1", d => d.source.x)
          .attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x)
          .attr("y2", d => d.target.y);

        nodeGroup
          .attr("transform", d => `translate(${d.x},${d.y})`);
      });
    }

    loadTopology();
  </script>
</body>
</html>
